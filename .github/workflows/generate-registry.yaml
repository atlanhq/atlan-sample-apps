name: Generate Registry

on:
  pull_request:
    branches: [main]
    paths:
      - "**/atlan-app-registry.json"
      - "scripts/generate-registry.sh"
      - ".github/workflows/generate-registry.yaml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-registry:
    runs-on: ubuntu-latest
    # Don't run on PRs from forks (token won't have push access)
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.ORG_PAT_GITHUB }}

      - name: Generate registry.json
        run: |
          bash scripts/generate-registry.sh \
            "${{ github.repository }}" \
            "main"

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add registry.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: auto-regenerate registry.json"
            git push
          else
            echo "registry.json is already up to date"
          fi

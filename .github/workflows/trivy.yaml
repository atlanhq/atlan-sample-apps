# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Trivy Security Scan

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    # Run at 21:35 (9:35 PM UTC) every Wednesday
    - cron: "35 21 * * 3"

permissions:
  contents: read
  pull-requests: write
  actions: read
  security-events: write

jobs:
  detect-changed-apps:
    name: Detect Changed Apps
    runs-on: ubuntu-latest
    outputs:
      app_dirs: ${{ steps.detect.outputs.app_dirs }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect app directories with changes
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE=${{ github.event.pull_request.base.sha }}
            HEAD=${{ github.event.pull_request.head.sha }}
            CHANGED=$(git diff --name-only "$BASE" "$HEAD")
          else
            # On push/schedule, scan all apps that have a uv.lock
            CHANGED=$(find . -name "uv.lock" -not -path "*/.git/*")
          fi

          # Collect unique top-level app directories that contain a uv.lock
          APP_DIRS=$(echo "$CHANGED" \
            | grep -oE '^[^/]+/[^/]+' \
            | sort -u \
            | while read dir; do
                [ -f "$dir/uv.lock" ] && echo "$dir"
              done \
            | jq -R -s -c 'split("\n") | map(select(length > 0))')

          echo "app_dirs=$APP_DIRS" >> "$GITHUB_OUTPUT"
          echo "Scanning: $APP_DIRS"

  scan:
    name: Trivy Scan (${{ matrix.app_dir }})
    needs: detect-changed-apps
    if: needs.detect-changed-apps.outputs.app_dirs != '[]' && needs.detect-changed-apps.outputs.app_dirs != 'null'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app_dir: ${{ fromJson(needs.detect-changed-apps.outputs.app_dirs) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy vulnerability scanner on ${{ matrix.app_dir }}
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: ${{ matrix.app_dir }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
          scanners: vuln
        env:
          TRIVY_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-db:2
          TRIVY_JAVA_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-java-db:1

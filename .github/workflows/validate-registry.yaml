name: Validate Registry

on:
  pull_request:
    branches: [main]
    paths:
      - "**/atlan-app-registry.json"
      - ".github/workflows/generate-registry.yaml"
      - ".github/workflows/validate-registry.yaml"

permissions:
  contents: read

env:
  # Must match SCAN_BRANCHES in generate-registry.yaml.
  SCAN_BRANCHES: |-
    main

  REQUIRED_FIELDS: "name type published"
  ALLOWED_TYPES: "template sample"
  ALLOWED_PUBLISHED: "true false"

jobs:
  validate-and-dry-run:
    name: Validate Manifests & Dry-Run Generation
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout PR
        uses: actions/checkout@v6

      - name: Validate manifests and generate registry (dry-run)
        run: |
          set -euo pipefail

          REPO="${{ github.repository }}"
          REPO_NAME=$(echo "$REPO" | cut -d'/' -f2)
          REGISTRY_FILE="registry-dry-run.json"
          echo '{"templates":{},"samples":{}}' > "$REGISTRY_FILE"

          SEEN_NAMES=""
          ERRORS=0

          MANIFESTS=$(find . -name "atlan-app-registry.json" -not -path "./.github/*" | sort)

          if [ -z "$MANIFESTS" ]; then
            echo "ERROR: No atlan-app-registry.json manifests found"
            exit 1
          fi

          for MANIFEST in $MANIFESTS; do
            echo "Validating: $MANIFEST"

            # --- JSON validation ---

            if ! jq empty "$MANIFEST" 2>/dev/null; then
              echo "  ERROR: Invalid JSON"
              ERRORS=$((ERRORS + 1))
              continue
            fi

            # --- Reject unknown fields ---

            ACTUAL_FIELDS=$(jq -r 'keys[]' "$MANIFEST")
            for FIELD in $ACTUAL_FIELDS; do
              if ! echo "$REQUIRED_FIELDS" | grep -qw "$FIELD"; then
                echo "  ERROR: Unknown field '$FIELD' (allowed: $REQUIRED_FIELDS)"
                ERRORS=$((ERRORS + 1))
              fi
            done

            # --- Check required fields and read values ---

            declare -A FIELDS
            MANIFEST_VALID=true
            for FIELD in $REQUIRED_FIELDS; do
              FIELDS[$FIELD]=$(jq -r --arg f "$FIELD" '.[$f] // empty' "$MANIFEST")
              if [ -z "${FIELDS[$FIELD]}" ]; then
                echo "  ERROR: Missing required field '$FIELD'"
                ERRORS=$((ERRORS + 1))
                MANIFEST_VALID=false
              fi
            done

            NAME="${FIELDS[name]}"
            TYPE="${FIELDS[type]}"
            PUBLISHED="${FIELDS[published]}"

            # --- Validate field values ---

            if [ -n "$TYPE" ] && ! echo "$ALLOWED_TYPES" | grep -qw "$TYPE"; then
              echo "  ERROR: Invalid type '$TYPE' (must be one of: $ALLOWED_TYPES)"
              ERRORS=$((ERRORS + 1))
              MANIFEST_VALID=false
            fi

            if [ -n "$PUBLISHED" ] && ! echo "$ALLOWED_PUBLISHED" | grep -qw "$PUBLISHED"; then
              echo "  ERROR: Invalid published value '$PUBLISHED' (must be one of: $ALLOWED_PUBLISHED)"
              ERRORS=$((ERRORS + 1))
              MANIFEST_VALID=false
            fi

            # Skip from registry generation if invalid or unpublished
            if [ "$MANIFEST_VALID" != "true" ]; then
              continue
            fi
            if [ "$PUBLISHED" != "true" ]; then
              echo "  OK (skipped, published=false)"
              continue
            fi

            # --- Duplicate detection ---

            QUALIFIED_NAME="${TYPE}:${NAME}"
            if echo "$SEEN_NAMES" | grep -qw "$QUALIFIED_NAME"; then
              echo "  ERROR: Duplicate name '$NAME' for type '$TYPE'"
              ERRORS=$((ERRORS + 1))
              continue
            fi
            SEEN_NAMES="$SEEN_NAMES $QUALIFIED_NAME"

            # --- Dry-run registry generation (iterate over SCAN_BRANCHES) ---

            while IFS= read -r BRANCH; do
              [ -z "$BRANCH" ] && continue
              SAFE_BRANCH=$(echo "$BRANCH" | tr '/' '-')
              DIR_PATH=$(echo "$MANIFEST" | sed 's|^\./||' | xargs dirname)
              ZIP_URL="https://github.com/${REPO}/archive/refs/heads/${BRANCH}.zip"
              ARCHIVE_PATH="${REPO_NAME}-${SAFE_BRANCH}/${DIR_PATH}"

              REGISTRY_KEY="${TYPE}s"
              jq --arg key "$REGISTRY_KEY" \
                 --arg name "$NAME" \
                 --arg zipUrl "$ZIP_URL" \
                 --arg path "$ARCHIVE_PATH" \
                '.[$key][$name] = {"zipUrl": $zipUrl, "path": $path}' \
                "$REGISTRY_FILE" > "${REGISTRY_FILE}.tmp" && mv "${REGISTRY_FILE}.tmp" "$REGISTRY_FILE"
            done <<< "$SCAN_BRANCHES"

            echo "  OK: name=$NAME type=$TYPE published=$PUBLISHED"
          done

          # Fail if any manifest had errors
          if [ "$ERRORS" -gt 0 ]; then
            echo ""
            echo "Validation failed with $ERRORS error(s)"
            exit 1
          fi

          # Validate the generated registry
          echo ""
          echo "Dry-run generated registry:"
          jq . "$REGISTRY_FILE"

          TEMPLATE_COUNT=$(jq '.templates | length' "$REGISTRY_FILE")
          SAMPLE_COUNT=$(jq '.samples | length' "$REGISTRY_FILE")
          echo ""
          echo "Registry would contain $TEMPLATE_COUNT templates and $SAMPLE_COUNT samples"

          if [ "$TEMPLATE_COUNT" -eq 0 ] && [ "$SAMPLE_COUNT" -eq 0 ]; then
            echo "ERROR: Generated registry is empty"
            exit 1
          fi

          # Validate every entry has the fields the CLI expects
          INVALID=$(jq -r '
            [.templates, .samples] | add | to_entries[] |
            select(.value.zipUrl == null or .value.path == null) |
            .key
          ' "$REGISTRY_FILE")

          if [ -n "$INVALID" ]; then
            echo "ERROR: The following entries are missing zipUrl or path:"
            echo "$INVALID"
            exit 1
          fi

          echo "All entries have required fields (zipUrl, path)"

name: generic
# app_id: <uuid>  # obtain from Global Marketplace after registering your app
display_name: "Generic Connector"
type: connector
icon_url: ""
visibility: public
build_tag: v1
self_deployed_runtime: false
deploy:
  execution_mode: native
  splitDeploymentEnabled: true
  keda:
    enabled: true
  env:
    ATLAN_HEARTBEAT_TIMEOUT_SECONDS: '120'
    ATLAN_START_TO_CLOSE_TIMEOUT_SECONDS: '7200'
    ATLAN_TENANT_ID: default
  dapr:
    objectstore: true
    secretstore: true
    statestore: false
    eventstore: true
    subscription: false
    configurationstore: false
    lock: false

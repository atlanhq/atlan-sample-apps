name: CI/CD - Fabric Workspace Tagger

on:
  push:
    branches: [main, develop]
    paths:
      - 'connectors/fabric-workspace-tagger/**'
  pull_request:
    branches: [main, develop]
    paths:
      - 'connectors/fabric-workspace-tagger/**'

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install dependencies
        working-directory: connectors/fabric-workspace-tagger
        run: |
          uv sync

      - name: Run unit tests
        working-directory: connectors/fabric-workspace-tagger
        run: |
          uv run pytest tests/ -v --cov=app --cov-report=xml --cov-report=term

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./connectors/fabric-workspace-tagger/coverage.xml
          flags: fabric-workspace-tagger

  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install dependencies
        working-directory: connectors/fabric-workspace-tagger
        run: |
          uv sync

      - name: Run pre-commit checks
        working-directory: connectors/fabric-workspace-tagger
        run: |
          uv run pre-commit run --all-files

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [test, lint]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Harbor Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.HARBOR_REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Extract version from pyproject.toml
        id: version
        working-directory: connectors/fabric-workspace-tagger
        run: |
          VERSION=$(grep -oP '^version = "\K[^"]+' pyproject.toml)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Build version: $VERSION"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: connectors/fabric-workspace-tagger
          push: true
          tags: |
            ${{ secrets.HARBOR_REGISTRY }}/apps/fabric-workspace-tagger:${{ steps.version.outputs.version }}
            ${{ secrets.HARBOR_REGISTRY }}/apps/fabric-workspace-tagger:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        run: echo "Image pushed with digest ${{ steps.docker_build.outputs.digest }}"
